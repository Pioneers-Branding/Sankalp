name: Deploy to VPS

on:
  push:
    branches:
      - main
      - master # Triggers on master or main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # (Optional) If you have a build step (like npm install && npm run build), add it here

      - name: Sync files to VPS
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          ARGS: "-rltgoDzvO --delete"
          SOURCE: "./" # Directory to copy (change if you have a build output folder like 'dist/')
          REMOTE_HOST: ${{ secrets.VPS_HOST }}
          REMOTE_USER: ${{ secrets.VPS_USERNAME }}
          REMOTE_PORT: ${{ secrets.VPS_PORT }}
          TARGET: "/var/www/sankalp" # IMPORTANT: Change this to the actual path on your VPS
